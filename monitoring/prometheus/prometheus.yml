global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'agent-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['agent-service:8000']

  - job_name: 'analytics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['analytics-service:8001']
