apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aiops-postgres
spec:
  serviceName: "aiops-postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: aiops-postgres
  template:
    metadata:
      labels:
        app: aiops-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: dbport
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: aiops-config
                  key: DB_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: aiops-config
                  key: DB_NAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-postgres-service
spec:
  selector:
    app: aiops-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
