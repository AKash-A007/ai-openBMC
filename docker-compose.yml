version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aiops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  agent-service:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    container_name: aiops-agent-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telemetry
      PORT: 8000
      JWT_SECRET: AIOPS_SUPER_SECRET_KEY_12345
    depends_on:
      - postgres

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    container_name: aiops-analytics-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telemetry
      PORT: 8001
    depends_on:
      - postgres

  collector-service:
    build:
      context: .
      dockerfile: services/collector/Dockerfile
    container_name: aiops-collector-service
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: telemetry
      POLL_INTERVAL: 5
    depends_on:
      - postgres

  dashboard-service:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: aiops-dashboard-service
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      AGENT_SERVICE_URL: http://agent-service:8000
      ANALYTICS_SERVICE_URL: http://analytics-service:8001
    depends_on:
      - agent-service
      - analytics-service

  prometheus:
    image: prom/prometheus:latest
    container_name: aiops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: aiops-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
