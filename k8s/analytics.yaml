apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-analytics
  template:
    metadata:
      labels:
        app: aiops-analytics
    spec:
      containers:
        - name: analytics
          image: aiops-analytics:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: PORT
              value: "8001"
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-analytics-service
spec:
  selector:
    app: aiops-analytics
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
