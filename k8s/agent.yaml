apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
    spec:
      containers:
        - name: agent
          image: aiops-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: jwt-secret
            - name: PORT
              value: "8000"
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent-service
spec:
  selector:
    app: aiops-agent
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
